<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro Pokémon – Búsqueda de Mascotas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/busqueda.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="cross">
      <svg viewBox="0 0 28 28" fill="none"><rect x="11" y="1" width="6" height="26" rx="2" fill="white"/><rect x="1" y="11" width="26" height="6" rx="2" fill="white"/></svg>
    </div>
    <span>CENTRO POKÉMON<br>VETERINARIA</span>
  </div>
  <div class="topbar-right">
    <span class="session-badge" id="session-badge">—</span>
    <nav class="topbar-nav">
      <a href="login.html"><i class="fa-solid fa-left-long"></i> Salir</a>
      <a href="busqueda.html" class="active"><i class="fa-solid fa-magnifying-glass"></i> Búsqueda</a>
      <a href="vacunacion.html"><i class="fa-solid fa-syringe"></i> Vacunación</a>
    </nav>
  </div>
</div>

<div class="page">
  <div class="page-title">BÚSQUEDA DE MASCOTAS</div>
  <div class="page-subtitle">Busca por nombre del paciente</div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Ej: Firulais, Rocky, Luna…" maxlength="100">
    <button class="btn-search" id="btn-buscar">BUSCAR</button>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="results-header">
    <div class="results-count">Mostrando <span id="results-count">0</span> resultados</div>
  </div>

  <div class="table-wrap">
    <table id="results-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>NOMBRE</th>
          <th>ESPECIE</th>
          <th>ESTADO</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="4"><div class="loading">CARGANDO DATOS...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>


<script src="js/busqueda.js"></script>
</body>
</html>
